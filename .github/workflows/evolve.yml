name: evolution

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  evolve:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: setup github cli
        run: gh auth status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
      - name: configure git
        run: |
          git config user.name "ginji-wanders[bot]"
          git config user.email "ginji-wanders[bot]@users.noreply.github.com"
      - name: run evolution (attempt 1)
        id: attempt1
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && 'true' || '' }}
        run: |
          chmod +x scripts/evolve.sh
          rm -f .evolve_failure_kind
          set +e
          ./scripts/evolve.sh
          status=$?
          failure_kind="$(cat .evolve_failure_kind 2>/dev/null || echo none)"
          retryable=false
          if [ "$failure_kind" = "transient-runtime" ]; then
            retryable=true
          fi
          echo "failure_kind=$failure_kind" >> "$GITHUB_OUTPUT"
          echo "retryable=$retryable" >> "$GITHUB_OUTPUT"
          exit $status
      - name: retry after 5min for transient runtime failures
        id: attempt2
        if: steps.attempt1.outcome == 'failure' && steps.attempt1.outputs.retryable == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && 'true' || '' }}
        run: sleep 300 && ./scripts/evolve.sh
